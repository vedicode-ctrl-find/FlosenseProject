<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Creation & Assignment | FlowSense</title>
    <meta name="description" content="Assign tasks intelligently based on skills and workload.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/assign-task.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body light-theme">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fas fa-wind logo-icon"></i>
            <span>FlowSense</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Overview</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-project-diagram"></i>
                <span>Projects</span>
            </a>
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Team Hub</span>
            </a>
            <a href="assign-task.html" class="nav-item active">
                <i class="fas fa-tasks"></i>
                <span>Assign Tasks</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff" alt="User" id="user-avatar">
                <div class="user-info">
                    <p class="user-name" id="user-name-display">Loading...</p>
                    <p class="user-role" id="user-role-display">Team Lead</p>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search tasks, members, or projects...">
            </div>
            <div class="top-actions">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i>
                </div>
                <button class="btn btn-primary btn-sm" onclick="window.location.href='create-project.html'">
                    <i class="fas fa-plus"></i>
                    <span>New Project</span>
                </button>
            </div>
        </header>

        <!-- View Container: Shows loading spinner until JS auth check completes -->
        <div id="view-container" class="view-animate">
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:16px;">
                <div style="width:48px; height:48px; border:4px solid #e9d5ff; border-top-color:#8b5cf6; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
                <p style="font-size:14px; color:#64748b;">Verifying Team Lead access...</p>
            </div>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
    </main>

    <!-- Post-Assignment Smart Popup overlay -->
    <div class="modal-overlay" id="post-assign-modal" style="display: none;">
         <div class="modal-content">
             <div class="modal-header">
                 <h3><i class="fas fa-exclamation-circle text-red"></i> Overload Warning</h3>
             </div>
             <div class="modal-body" id="post-assign-body">
                 <!-- Injected dynamically -->
             </div>
             <div class="modal-actions">
                 <button class="btn btn-secondary" id="btn-keep-assign">Keep Assignment</button>
                 <button class="btn btn-primary" id="btn-accept-suggestion">Accept Suggestion</button>
             </div>
         </div>
    </div>
    
    <!-- Toast Message Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/assign-task.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FlowSense</title>
    <meta name="description" content="Sign in to your FlowSense dashboard — manage your team's workload intelligently.">
    <link rel="stylesheet" href="../css/style.css">
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <style>
        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--white);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 380px;
            backdrop-filter: blur(12px);
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast.toast-error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .toast.toast-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .toast.toast-info {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
        }
        .toast-icon { font-size: 18px; flex-shrink: 0; }
        .toast-close {
            margin-left: auto;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 16px;
            padding: 0 0 0 8px;
            transition: color 0.2s;
        }
        .toast-close:hover { color: var(--white); }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            animation: toastProgress 4s linear forwards;
        }
        @keyframes toastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Loading Spinner */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
        .auth-logo {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <div class="auth-card">
        <div class="auth-header">
            <img src="../logo.png" alt="FlowSense Logo" class="auth-logo">

            <p>Welcome back! Sign in to your dashboard.</p>
        </div>

        <div class="role-toggle">
            <button class="role-btn active" id="btn-company" onclick="setRole('company')">Company</button>
            <button class="role-btn" id="btn-employee" onclick="setRole('employee')">Employee</button>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email" id="email-label">Company Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="admin@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="company-code">Company Code</label>
                <div class="input-wrapper">
                    <input type="text" id="company-code" placeholder="e.g., COMP2026" style="text-transform: uppercase;" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="login-btn">Sign In to Dashboard</button>
        </form>

        <div class="auth-footer">
            <p>New here? <a href="signup.html">Create Account</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/auth';
        let currentRole = 'company';

        // ── Toast Notification System ──
        function showToast(message, type = 'error', duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const icons = { error: '✕', success: '✓', info: 'ℹ' };
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || '●'}</span>
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
                <div class="toast-progress"></div>
            `;

            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        // ── Role Toggle ──
        function setRole(role) {
            currentRole = role;
            document.getElementById('btn-company').classList.toggle('active', role === 'company');
            document.getElementById('btn-employee').classList.toggle('active', role === 'employee');

            const emailLabel = document.getElementById('email-label');
            const emailInput = document.getElementById('email');

            if (role === 'employee') {
                emailLabel.innerText = 'Employee Email';
                emailInput.placeholder = 'name@domain.com';
            } else {
                emailLabel.innerText = 'Company Email';
                emailInput.placeholder = 'admin@company.com';
            }
        }

        // Initialize
        setRole('company');

        // ── Login Form Submit ──
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loginBtn = document.getElementById('login-btn');
            const originalBtnText = loginBtn.innerText;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const company_code = document.getElementById('company-code').value.trim();

            if (!email || !password || !company_code) {
                showToast('Please enter email, password, and company code.', 'error');
                return;
            }

            // Loading state
            loginBtn.innerText = 'Verifying...';
            loginBtn.disabled = true;
            loginBtn.classList.add('btn-loading');

            try {
                // 1. Try to sign in with Firebase Authentication
                let user;
                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    user = userCredential.user;
                } catch (fbError) {
                    // 2. If user not found in Firebase, fallback to MongoDB to check if they are an old user
                    if (fbError.code === 'auth/user-not-found' || fbError.code === 'auth/invalid-credential') {
                        const endpoint = currentRole === 'employee' ? '/employee/login' : '/login';
                        const response = await fetch(`${API_URL}${endpoint}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password, company_code })
                        });

                        const data = await response.json();

                        if (data.success) {
                            // 3. User exists in MongoDB! Let's auto-register them in Firebase now.
                            showToast('Migrating your account to Firebase...', 'info');
                            const newUserCred = await auth.createUserWithEmailAndPassword(email, password);
                            user = newUserCred.user;
                            
                            // Continue to store session data
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('firebaseUid', user.uid);
                            localStorage.setItem('userRole', data.data.role);
                            localStorage.setItem('userName', currentRole === 'employee' ? data.data.name : data.data.company_name);
                            localStorage.setItem('userId',    data.data.id || '');
                            localStorage.setItem('companyId', data.data.company_id || data.data.id || '');
                            
                            showToast(`Migration successful! Welcome back, ${localStorage.getItem('userName')}`, 'success');
                            setTimeout(() => {
                                const targetDash = data.data.role === 'employee' ? 'dashboard-employee.html' : 'dashboard-company.html';
                                window.location.href = `../${targetDash}`;
                            }, 1500);
                            return;
                        } else {
                            throw fbError; // Neither Firebase nor MongoDB recognized the user
                        }
                    } else {
                        throw fbError;
                    }
                }

                // 4. If we got here, Firebase login was successful (standard flow)
                const endpoint = currentRole === 'employee' ? '/employee/login' : '/login';
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, company_code })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('firebaseUid', user.uid);
                    localStorage.setItem('userRole', data.data.role);
                    localStorage.setItem('userName', currentRole === 'employee' ? data.data.name : data.data.company_name);
                    localStorage.setItem('userId',    data.data.id || '');
                    localStorage.setItem('companyId', data.data.company_id || data.data.id || '');
                    
                    showToast(`Welcome back, ${localStorage.getItem('userName')}!`, 'success');
                    setTimeout(() => {
                        const targetDash = data.data.role === 'employee' ? 'dashboard-employee.html' : 'dashboard-company.html';
                        window.location.href = `../${targetDash}`; 
                    }, 1500);
                } else {
                    showToast(data.message || 'Identity sync failed.', 'error');
                    loginBtn.innerText = originalBtnText;
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('btn-loading');
                }
            } catch (error) {
                console.error('Full Login Error Detail:', error);
                let errorMsg = 'Login failed. Please check your credentials.';
                
                if (error.code) {
                    // Firebase specific errors
                    if (error.code === 'auth/wrong-password') errorMsg = 'Incorrect password for this email.';
                    if (error.code === 'auth/user-not-found') errorMsg = 'No Firebase account found. Please check your email or Sign Up.';
                    if (error.code === 'auth/invalid-email') errorMsg = 'The email address is badly formatted.';
                    if (error.code === 'auth/too-many-requests') errorMsg = 'Too many failed attempts. Please try again later.';
                    if (error.code === 'auth/email-already-in-use') errorMsg = 'This email is already in use in Firebase.';
                } else if (error.message) {
                    errorMsg = error.message;
                }
                
                showToast(errorMsg, 'error');
                loginBtn.innerText = originalBtnText;
                loginBtn.disabled = false;
                loginBtn.classList.remove('btn-loading');
            }
        });
    </script>
</body>
</html>
